name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # postinstall runs `prisma generate`; Prisma Client is needed for type-checks
      # even though no DB is reachable in CI. If this step becomes expensive,
      # gate it behind a conditional install.
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      # Build is intentionally omitted: it runs `prisma migrate deploy`, which
      # needs a real database. Build + deploy happen in the hosting provider.
